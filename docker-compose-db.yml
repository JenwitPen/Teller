version: '3.8'

services:
  sql-edge:
    image: mcr.microsoft.com/azure-sql-edge
    container_name: sql-edge
    platform: linux/amd64
    environment:
      ACCEPT_EULA: "1"
      MSSQL_SA_PASSWORD: "MyPass@word"
      MSSQL_PID: "Developer"
    ports:
      - "1433:1433"
    volumes:
      - ./volumes/data2:/var/opt/mssql/data
